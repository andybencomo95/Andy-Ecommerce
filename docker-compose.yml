# ============================================
# DOCKER COMPOSE - Why?
# Orquestra múltiples contenedores de forma integrada.
# Define servicios, redes y volúmenes en un solo archivo.
# Facilita el desarrollo y deployment local.
# ============================================

version: '3.8'

services:
  # ============================================
  # BACKEND - API Node.js
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: andy-ecommerce-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-change-in-production}
      - FRONTEND_URL=http://localhost:5173
    volumes:
      # Persistir base de datos
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # FRONTEND - React + Nginx
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: andy-ecommerce-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

# ============================================
# VOLUMES - Persistir datos
# ============================================
volumes:
  db-data:
    driver: local

# ============================================
# REDES - Comunicación entre servicios
# ============================================
networks:
  default:
    name: andy-ecommerce-network

# ============================================
# USAGE:
# 1. Development: docker-compose up
# 2. Production: docker-compose -f docker-compose.yml up -d
# 3. Logs: docker-compose logs -f
# 4. Stop: docker-compose down
# ============================================