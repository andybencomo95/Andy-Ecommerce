# Andy Ecommerce - Docker Compose
# Development: docker compose up -d
# Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ============================================
  # POSTGRES (producción)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: andy-ecommerce-db
    environment:
      POSTGRES_DB: andy_ecommerce
      POSTGRES_USER: andy_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-in-production}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U andy_user -d andy_ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # BACKEND - API Node.js
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      args:
        PRISMA_SCHEMA: prisma/schema.prod.prisma
    container_name: andy-ecommerce-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-postgresql://andy_user:change-in-production@postgres:5432/andy_ecommerce}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:80}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # FRONTEND - React + Nginx
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: andy-ecommerce-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  default:
    name: andy-ecommerce-network
